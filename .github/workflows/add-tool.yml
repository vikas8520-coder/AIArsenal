name: Add Tool(s) to AIArsenal

on:
  repository_dispatch:
    types: [new-tool, new-tools]
  workflow_dispatch:
    inputs:
      tool_json:
        description: "Tool data as JSON — single object or array of objects"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: add-tool
  cancel-in-progress: false

jobs:
  add-tool:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Add tool(s) to tools.js
        env:
          TOOL_JSON: ${{ github.event_name == 'repository_dispatch' && (github.event.client_payload.tools && toJSON(github.event.client_payload.tools) || toJSON(github.event.client_payload.tool)) || inputs.tool_json }}
        run: node scripts/add-tool.mjs

      - name: Regenerate embeddings
        run: npm run embeddings

      - name: Commit and push
        env:
          TOOL_JSON: ${{ github.event_name == 'repository_dispatch' && (github.event.client_payload.tools && toJSON(github.event.client_payload.tools) || toJSON(github.event.client_payload.tool)) || inputs.tool_json }}
        run: |
          # Extract name(s) for commit message
          TOOL_NAMES=$(node -e "
            const d = JSON.parse(process.env.TOOL_JSON);
            const arr = Array.isArray(d) ? d : [d];
            console.log(arr.length === 1 ? arr[0].name : arr.length + ' tools');
          ")
          git config user.name "arsenal-bot"
          git config user.email "arsenal-bot@users.noreply.github.com"
          git add src/data/tools.js src/data/tool-embeddings.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "feat: add ${TOOL_NAMES}"
          git push
