name: Add Tool to AIArsenal

on:
  repository_dispatch:
    types: [new-tool]
  workflow_dispatch:
    inputs:
      tool_json:
        description: "Tool data as JSON (name, url, category, subcategory, desc, detail, free, company, oss, privacy, tags)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: add-tool
  cancel-in-progress: false

jobs:
  add-tool:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Add tool to tools.js
        env:
          TOOL_JSON: ${{ github.event_name == 'repository_dispatch' && toJSON(github.event.client_payload.tool) || inputs.tool_json }}
        run: node scripts/add-tool.mjs

      - name: Regenerate embeddings
        run: npm run embeddings

      - name: Commit and push
        env:
          TOOL_JSON: ${{ github.event_name == 'repository_dispatch' && toJSON(github.event.client_payload.tool) || inputs.tool_json }}
        run: |
          TOOL_NAME=$(node -e "console.log(JSON.parse(process.env.TOOL_JSON).name)")
          git config user.name "arsenal-bot"
          git config user.email "arsenal-bot@users.noreply.github.com"
          git add src/data/tools.js src/data/tool-embeddings.json
          git commit -m "feat: add tool — ${TOOL_NAME}"
          git push
