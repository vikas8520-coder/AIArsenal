substitutions:
  _TAG: ${COMMIT_SHA:-latest}

steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/aiarsenal/app:${_TAG}'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/aiarsenal/app:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/aiarsenal/app'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aiarsenal'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/aiarsenal/app:${_TAG}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--memory'
      - '512Mi'
      - '--set-secrets'
      - 'AIRTABLE_API_KEY=AIRTABLE_API_KEY:latest,AIRTABLE_BASE_ID=AIRTABLE_BASE_ID:latest,GOOGLE_AI_API_KEY=GOOGLE_AI_API_KEY:latest'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/aiarsenal/app'

options:
  logging: CLOUD_LOGGING_ONLY
